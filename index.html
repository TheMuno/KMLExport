<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khonsu Day Planner</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      color: #222;
    }

    #map {
      width: 500px;
      height: 500px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    #toolbar {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }

    .toolbar-btn {
      padding: 10px 18px;
      font-size: 0.9rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #FF853D;
      color: #fff;
      font-weight: 600;
    }

    .toolbar-btn:hover {
      background: #e6722d;
    }
  </style>
</head>
<body>

  <h1>Khonsu Day Planner</h1>

  <div id="map"></div>

  <div id="toolbar">
    <button id="export-kml" class="toolbar-btn" onclick="handleExportMap()">📍 Export Map</button>
  </div>

  <!-- Toast notification -->
  <div id="toast" style="display:none; margin-top:14px; padding:10px 16px; background:#333; color:#fff; border-radius:6px; font-size:0.85rem;"></div>

  <script>
    // Mock trip data — replace with Firebase fetch when implemented
    const currentTrip = {
      userName: "Rob",
      tripDates: { start: "2026-07-15", end: "2026-07-16" },
      hotel: {
        name: "The Lucerne Hotel",
        lat: 40.7829,
        lng: -73.9765
      },
      days: [
        {
          dayNumber: 1,
          activities: [
            {
              name: "American Museum of Natural History",
              type: "attraction",
              place_id: "ChIJCXoPsPBYwokR3GcGHlKL68I",
              lat: 40.7813,
              lng: -73.9740,
              time: "10:00 AM"
            },
            {
              name: "Shake Shack - Upper West Side",
              type: "restaurant",
              place_id: "ChIJj2Mv6PBYwokRRBaOoKmHELQ",
              lat: 40.7812,
              lng: -73.9810,
              time: "12:30 PM"
            },
            {
              name: "Central Park",
              type: "park",
              place_id: "ChIJ4zGFAZpYwokRGUGph3Mf37k",
              lat: 40.7851,
              lng: -73.9683,
              time: "2:00 PM"
            }
          ]
        },
        {
          dayNumber: 2,
          activities: [
            {
              name: "The Metropolitan Museum of Art",
              type: "attraction",
              place_id: "ChIJb8Jg9pZYwokR-qHnxoHF-tg",
              lat: 40.7794,
              lng: -73.9632,
              time: "10:00 AM"
            },
            {
              name: "Sarabeth's Central Park South",
              type: "restaurant",
              place_id: "ChIJN1t_tDeuEmsRUsoyG83frY4",
              lat: 40.7659,
              lng: -73.9772,
              time: "1:00 PM"
            },
            {
              name: "Fifth Avenue Shopping",
              type: "shopping",
              place_id: "ChIJj3jAGKtZwokRDMmJMJgBMPs",
              lat: 40.7580,
              lng: -73.9855,
              time: "3:00 PM"
            }
          ]
        }
      ]
    };

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    async function handleExportMap() {
      // 1. Get trip data
      const tripData = currentTrip;

      // 3. Validate
      const totalActivities = tripData.days.reduce((sum, d) => sum + d.activities.length, 0);
      if (totalActivities === 0) {
        showToast('Add activities to your itinerary before exporting.');
        return;
      }

      // 4. Loading state
      const btn = document.getElementById('export-kml');
      btn.disabled = true;
      btn.textContent = 'Generating map...';

      try {
        // 5. Resolve missing lat/lng
        const resolvedTripData = await resolveAllLatLng(tripData);

        // 6. Generate and download
        await generateAndDownloadKmz(resolvedTripData);

        // 7. Success toast
        showToast('✓ Map exported! Open on your phone with Google Maps.');
      } catch (err) {
        console.error('KML export failed:', err);
        showToast('Something went wrong. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = '📍 Export Map';
      }
    }

    function initMap() {
      const newYork = { lat: 40.7128, lng: -74.0060 };
      const map = new google.maps.Map(document.getElementById('map'), {
        center: newYork,
        zoom: 12
      });
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="kml-export/icon-mapper.js"></script>
  <script src="kml-export/kml-generator.js"></script>
  <script src="kml-export/download-handler.js"></script>
  <script src="kml-export/kmz-builder.js"></script>

  <!-- Replace YOUR_API_KEY with your Google Maps JavaScript API key -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDM7Sbx3ogbiG0l_c-j7PJk4m1ivbddY4I&callback=initMap">
  </script>

</body>
</html>
