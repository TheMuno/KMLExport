<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khonsu Day Planner</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      color: #222;
    }

    #map {
      width: 500px;
      height: 500px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    #toolbar {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }

    .toolbar-btn {
      padding: 10px 18px;
      font-size: 0.9rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #FF853D;
      color: #fff;
      font-weight: 600;
    }

    .toolbar-btn:hover {
      background: #e6722d;
    }
  </style>
</head>
<body>

  <h1>Khonsu Day Planner</h1>

  <div id="map"></div>

  <div id="toolbar">
    <button id="export-kml" class="toolbar-btn" onclick="handleExportMap()">📍 Export Map</button>
  </div>

  <!-- Toast notification -->
  <div id="toast" style="display:none; margin-top:14px; padding:10px 16px; background:#333; color:#fff; border-radius:6px; font-size:0.85rem;"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="kml-export/icon-mapper.js"></script>
  <script src="kml-export/kml-generator.js"></script>
  <script src="kml-export/download-handler.js"></script>
  <script src="kml-export/kmz-builder.js"></script>
  <script type="module" src="scripts.js"></script>

  <!-- Replace YOUR_API_KEY with your Google Maps JavaScript API key -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDM7Sbx3ogbiG0l_c-j7PJk4m1ivbddY4I&callback=initMap">
  </script>

</body>
</html>
